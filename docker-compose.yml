version: '3.8'

services:
  drafts-web:
    build: .
    container_name: drafts-web-capture
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - CAPTURE_PASSWORD=your_secure_password_here
    restart: unless-stopped
    networks:
      - drafts-network
    depends_on:
      - ts-drafts-web

  ts-drafts-web:
    image: tailscale/tailscale:latest
    container_name: ts-drafts-web
    volumes:
      - /var/lib/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY:-your-auth-key}
      - TS_HOSTNAME=drafts-web
      - TS_EXTRA_ARGS=--advertise-routes=10.0.0.0/24
    restart: unless-stopped
    networks:
      - drafts-network

networks:
  drafts-network:
    driver: bridge