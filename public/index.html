<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drafts Capture</title>
    <meta name="description" content="Capture text to Drafts app from the web">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#F0F0F2">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="page-wrapper">

        <header class="site-header">
            <a class="logo" href="/">
                <svg class="logo-icon" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <rect x="1.5" y="1.5" width="19" height="19" rx="4.5" stroke="#4A90D9" stroke-width="1.5"/>
                    <line x1="5" y1="7"  x2="17" y2="7"  stroke="#4A90D9" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="5" y1="11" x2="17" y2="11" stroke="#4A90D9" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="5" y1="15" x2="12" y2="15" stroke="#4A90D9" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <span class="logo-brand">Drafts</span>
                <span class="logo-suffix">Capture</span>
            </a>
            <a href="https://getdrafts.com" class="get-drafts-link" target="_blank" rel="noopener">Get Drafts &#x2192;</a>
        </header>

        <main>
            <div id="alert-container"></div>

            <!-- Sign-in card -->
            <div id="sign-in-section" class="card sign-in-card" style="display: none;">
                <div class="sign-in-icon" aria-hidden="true">
                    <svg width="40" height="40" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="1.5" y="1.5" width="19" height="19" rx="4.5" stroke="#4A90D9" stroke-width="1.5"/>
                        <line x1="5" y1="7"  x2="17" y2="7"  stroke="#4A90D9" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="5" y1="11" x2="17" y2="11" stroke="#4A90D9" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="5" y1="15" x2="12" y2="15" stroke="#4A90D9" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <h1 class="sign-in-title">Drafts Capture</h1>
                <p class="sign-in-description">Sign in with your Apple ID to sync drafts directly to your Drafts library on iPhone, iPad, and Mac.</p>
                <!-- CloudKit SDK renders its button here (hidden); our button delegates to it -->
                <div id="apple-sign-in-button" class="apple-sign-in-ck" aria-hidden="true"></div>
                <!-- Visible Apple button — triggers CloudKit sign-in flow -->
                <button type="button" class="btn-apple-id" onclick="window.cloudkit?.signIn?.()">
                    <svg class="apple-icon" viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.5-157.2-97.8C153.1 785.5 66 633.5 66 493.3c0-205.4 141.4-314 276.8-314 70.1 0 128.4 46.4 172.5 46.4 42.1 0 108.2-49 191.2-49 30.8 0 133.8 2.6 197.4 100.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
                    </svg>
                    Sign in with Apple ID
                </button>
                <div class="sign-in-divider"><span>or</span></div>
                <button type="button" id="use-local-btn" class="btn-use-local">Continue without signing in</button>
            </div>

            <!-- Capture form -->
            <div class="card capture-card" id="capture-section">
                <form id="capture-form" autocomplete="off">

                    <div class="content-field">
                        <textarea
                            id="draft-content"
                            name="content"
                            placeholder="What's on your mind?"
                            spellcheck="true"
                            rows="10"
                        ></textarea>
                    </div>

                    <div class="form-meta-row">
                        <div class="meta-left">
                            <div class="meta-field tags-field">
                                <svg class="meta-icon" width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                                    <path d="M2 4a2 2 0 012-2h4.586a1 1 0 01.707.293l5.414 5.414a1 1 0 010 1.414l-4.586 4.586a1 1 0 01-1.414 0L3.293 8.293A1 1 0 013 7.586V4z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
                                    <circle cx="5.5" cy="5.5" r="1" fill="currentColor"/>
                                </svg>
                                <input type="text" id="draft-tags" name="tags" placeholder="tags, comma-separated" spellcheck="false">
                            </div>
                            <div class="meta-field syntax-field">
                                <select id="draft-syntax" name="syntax">
                                    <option value="Plain Text">Plain Text</option>
                                    <option value="Markdown" selected>Markdown</option>
                                    <option value="MultiMarkdown">MultiMarkdown</option>
                                    <option value="GitHub Markdown">GitHub Markdown</option>
                                    <option value="Taskpaper">Taskpaper</option>
                                    <option value="Simple List">Simple List</option>
                                </select>
                            </div>
                            <label class="meta-field flagged-field" title="Flag this draft">
                                <input type="checkbox" id="draft-flagged" name="flagged">
                                <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                                    <path d="M3 2v12M3 2h9l-2.5 4L12 10H3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                <span>Flag</span>
                            </label>
                            <label class="meta-field location-field" title="Attach location">
                                <input type="checkbox" id="draft-location" name="useLocation">
                                <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                                    <path d="M8 1.5A4.5 4.5 0 0112.5 6c0 3-4.5 8.5-4.5 8.5S3.5 9 3.5 6A4.5 4.5 0 018 1.5z" stroke="currentColor" stroke-width="1.3"/>
                                    <circle cx="8" cy="6" r="1.5" stroke="currentColor" stroke-width="1.2"/>
                                </svg>
                                <span>Location</span>
                            </label>
                        </div>
                        <div class="meta-right">
                            <button type="button" id="clear-btn" class="btn-clear">Clear</button>
                            <button type="submit" class="btn-create">
                                <span class="btn-create-label">Create</span>
                                <span class="loading-spinner" aria-hidden="true" style="display:none"></span>
                            </button>
                        </div>
                    </div>

                </form>
            </div>

            <!-- Queue -->
            <div id="queue-section" class="card queue-card" style="display: none;">
                <div class="queue-header">
                    <span class="queue-title">Queued Drafts (<span id="queue-count">0</span>)</span>
                    <div class="queue-actions">
                        <button type="button" class="btn-submit-all" onclick="submitAllDrafts()">Submit All</button>
                        <button type="button" class="btn-discard-all" onclick="discardAllDrafts()">Discard All</button>
                    </div>
                </div>
                <div id="draft-list" class="draft-list"></div>
            </div>
        </main>

        <footer class="site-footer">
            <nav class="footer-nav">
                <a href="https://docs.getdrafts.com/docs/extensions/web-capture" class="help-link" target="_blank" rel="noopener">Help</a>
                <span class="footer-sep">·</span>
                <button type="button" id="sign-out-btn" class="btn-sign-out">Sign out</button>
            </nav>
            <div class="keyboard-shortcuts">
                <table>
                    <tbody>
                        <tr><td class="key">⇧⌃↩</td><td class="action">Create Draft</td></tr>
                        <tr><td class="key">⇧⌃B</td><td class="action">Edit content</td></tr>
                        <tr><td class="key">⇧⌃T</td><td class="action">Edit tags</td></tr>
                        <tr><td class="key">⇧⌃L</td><td class="action">Toggle flagged</td></tr>
                    </tbody>
                </table>
            </div>
            <p class="sign-out-hint">Sign out after use on shared computers</p>
        </footer>

    </div>

    <script src="config.js"></script>
    <script>
    window.__swReady = ('serviceWorker' in navigator)
        ? navigator.serviceWorker
              .register('sw.js')
              .then(() => {
                  if (navigator.serviceWorker.controller) return Promise.resolve();
                  return new Promise(resolve => {
                      const t = setTimeout(resolve, 3000);
                      navigator.serviceWorker.addEventListener('controllerchange', () => {
                          clearTimeout(t); resolve();
                      }, { once: true });
                  });
              })
              .catch(() => Promise.resolve())
        : Promise.resolve();
    </script>
    <script async src="https://cdn.apple-cloudkit.com/ck/2/cloudkit.js"></script>
    <script src="js/cloudkit.js"></script>
    <script src="js/app.js"></script>
    <!-- Pretext: accurate textarea auto-sizing without DOM reflow -->
    <script type="module" src="js/textarea-resize.js"></script>
</body>
</html>
